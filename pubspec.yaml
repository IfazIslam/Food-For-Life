name: foodforlife
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  flutter_riverpod: ^3.1.0
  flutter_animate: ^4.5.2
  google_fonts: ^8.0.2
  go_router: ^17.2.0
  geolocator: ^14.0.2
  http: ^1.6.0
  animated_text_kit: ^4.3.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  shared_preferences: ^2.5.5
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^21.0.0
  timeago: ^3.7.1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  riverpod_lint: ^3.1.0
  custom_lint: ^0.8.1
  flutter_launcher_icons: ^0.13.1
flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  min_sdk_android: 21
